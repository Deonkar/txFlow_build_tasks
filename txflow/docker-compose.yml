services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=redpanda:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  redpanda-console:
    image: redpandadata/console:latest
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  redpanda-init:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"
    entrypoint: ["bash"]
    environment:
      KAFKA_BROKERS: redpanda:9092
      LOG_RETENTION_MS: ${LOG_RETENTION_MS:-604800000}
    command:
      - -lc
      - |
        set -e
        set -u
        set -o pipefail
        echo "Creating topics (idempotent if already exist)..."
        rpk topic create payments.initiated --brokers "$$KAFKA_BROKERS" --partitions 3 --replicas 1 --config retention.ms="$$LOG_RETENTION_MS" || true
        rpk topic create payments.dlq --brokers "$$KAFKA_BROKERS" --partitions 1 --replicas 1 --config retention.ms=2592000000 || true
        echo "Topics ensured."

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: txflow
      POSTGRES_PASSWORD: txflow
      POSTGRES_DB: txflow
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txflow -d txflow"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  producer:
    build:
      context: ./producer
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      PAYMENTS_TOPIC: ${PAYMENTS_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: ${PORT}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS}
      FRAUD_THRESHOLD: ${FRAUD_THRESHOLD}
    ports:
      - "8000:8000"

  consumer-wallet:
    build:
      context: ./consumers
      dockerfile: wallet/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      PAYMENTS_TOPIC: ${PAYMENTS_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS}

  consumer-fraud:
    build:
      context: ./consumers
      dockerfile: fraud/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      PAYMENTS_TOPIC: ${PAYMENTS_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS}
      FRAUD_THRESHOLD: ${FRAUD_THRESHOLD}

  consumer-notifier:
    build:
      context: ./consumers
      dockerfile: notifier/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      PAYMENTS_TOPIC: ${PAYMENTS_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      REDIS_URL: ${REDIS_URL}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS}

  consumer-audit:
    build:
      context: ./consumers
      dockerfile: audit/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      PAYMENTS_TOPIC: ${PAYMENTS_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS}

  consumer-analytics:
    build:
      context: ./consumers
      dockerfile: analytics/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      PAYMENTS_TOPIC: ${PAYMENTS_TOPIC}
      DLQ_TOPIC: ${DLQ_TOPIC}
      REDIS_URL: ${REDIS_URL}
      DEDUP_TTL_SECONDS: ${DEDUP_TTL_SECONDS}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS}

  dlq-handler:
    build:
      context: ./consumers
      dockerfile: dlq_handler/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DLQ_TOPIC: ${DLQ_TOPIC}
      DATABASE_URL: ${DATABASE_URL}
      PORT: 8001
    ports:
      - "8001:8001"

